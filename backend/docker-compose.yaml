version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: ${CI_REGISTRY_IMAGE}/backend:latest
    ports:
      - "3000:3000"
    depends_on:
      - mongodb
    restart: always

 # backend:
 #   build:
  #    context: ./backend
  #  ports:
  #    - "3000:3000"
  #  environment:
   #   - MONGO_URI=mongodb://mongodb:27017/mydatabase
   # depends_on:
  #    - mongodb
  #  restart: always

frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ${CI_REGISTRY_IMAGE}/frontend:latest
    ports:
      - "80:5173"
    restart: always
    depends_on:
      - backend

mongodb:
    image: mongo:7.1.1
    volumes:
      - mongo-data:/data/db
    restart: always

volumes:
  mongo-data: