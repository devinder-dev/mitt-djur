server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — send all unknown paths to index.html
    # so React Router handles /missions, /shop etc. without nginx 404
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — long cache since Vite fingerprints filenames
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html — never cache so users always get the latest build
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
