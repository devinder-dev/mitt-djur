apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: petstep
type: Opaque
# NOTE: do NOT commit real secrets to git. base64 is encoding, NOT encryption.
# Fill in these values before deploying. Use `stringData` so you can paste plain text —
# Kubernetes base64-encodes it for you automatically.
#
# Generate JWT secrets with: openssl rand -hex 32
stringData:
  # MongoDB connection string (Atlas or in-cluster)
  MONGODB_URI: "REPLACE_WITH_YOUR_MONGODB_URI"

  # JWT signing secrets — must be at least 32 characters each
  JWT_ACCESS_SECRET: "REPLACE_WITH_JWT_ACCESS_SECRET"
  JWT_REFRESH_SECRET: "REPLACE_WITH_JWT_REFRESH_SECRET"

  # Public URL the frontend is served from — used for CORS
  FRONTEND_URL: "http://petstep.local"
